name: Create Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew clean build --stacktrace

      - name: Get version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get mod jar file
        id: jar_file
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v sources | grep -v javadoc | head -1)
          echo "JAR_PATH=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.VERSION }}
          name: GuildZip ${{ steps.tag_version.outputs.VERSION }}
          body: |
            # GuildZip ${{ steps.tag_version.outputs.VERSION }}
            
            Download the mod JAR below and place it in your mods folder.
          draft: false
          prerelease: false
          artifacts: ${{ steps.jar_file.outputs.JAR_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}

